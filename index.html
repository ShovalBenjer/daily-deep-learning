<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>הסדנה</title>
<meta name="description" content="הסדנה: תרגול יומי של שיקול דעת הנדסי. עיון, תרגול, הסמכה, מעקב מחקר.">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f3ea">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141519">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הסדנה">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=IBM+Plex+Mono:wght@400&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="progress" role="presentation"></div>
<header class="bar">
  <a class="wordmark" href="#/"><b>ה</b>סדנה</a>
  <span class="folio" id="folio"></span>
  <button class="iconbtn" id="themeToggle" aria-label="מצב תאורה">
    <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>
    <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" hidden><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>
</header>

<main>
  <div id="status">טוען...</div>
  <div id="view"></div>
</main>

<nav class="tabs">
  <a href="#/" id="tab-today">היום</a>
  <a href="#/map" id="tab-map">המפה</a>
  <a href="#/ladder" id="tab-ladder">המסלול</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
const $ = s => document.querySelector(s);
const iso = d => d.toISOString().slice(0, 10);
const MARKS = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז'];
let index = [], jmap = null, ladder = null;

/* ---- state ---- */
const store = {
  load() {
    let st = JSON.parse(localStorage.getItem('sadna-state') || 'null');
    if (!st) {
      st = { read: [], drill: [], maturity: {}, ladder: [] };
      const codex = JSON.parse(localStorage.getItem('codex-state') || 'null');
      if (codex) {
        st.read = codex.read || [];
        for (const [d, qs] of Object.entries(codex.quests || {})) if (qs.includes('crafting')) st.drill.push(d);
      }
    }
    return st;
  },
  save() { localStorage.setItem('sadna-state', JSON.stringify(S)); }
};
let S = store.load();
const toggle = (arr, v, on) => { const i = arr.indexOf(v); if (on && i < 0) arr.push(v); if (!on && i >= 0) arr.splice(i, 1); store.save(); };

function runLength() {
  const read = new Set(S.read);
  let n = 0, d = new Date();
  if (!read.has(iso(d))) d.setDate(d.getDate() - 1);
  while (read.has(iso(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

/* ---- theme ---- */
const applyTheme = t => {
  document.documentElement.dataset.theme = t;
  $('#sunIcon').hidden = t !== 'dark'; $('#moonIcon').hidden = t === 'dark';
};
applyTheme(localStorage.getItem('sadna-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
$('#themeToggle').onclick = () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sadna-theme', t); applyTheme(t);
};

function typeset(el) {
  if (window.renderMathInElement) {
    renderMathInElement(el, { delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false }
    ], throwOnError: false });
  } else setTimeout(() => typeset(el), 120);
}
const setTab = id => document.querySelectorAll('.tabs a').forEach(a => a.classList.toggle('active', a.id === id));

/* ---- today / archive ---- */
async function renderPost(i) {
  const p = index[i]; if (!p) return;
  setTab('tab-today');
  const view = $('#view');
  let md;
  try { md = await (await fetch('posts/' + p.date + '.md', { cache: 'no-cache' })).text(); }
  catch (e) { view.innerHTML = '<div id="status">הדף לא זמין כרגע.</div>'; return; }

  const tmp = document.createElement('div');
  tmp.innerHTML = marked.parse(md);
  const h1 = tmp.querySelector('h1');

  const art = document.createElement('article');
  art.innerHTML = `<header class="head">
    <div class="folio-line">שבוע ${p.week} · יום ${p.day} מתוך 70 · ${p.date}</div>
    <h1>${h1 ? h1.innerHTML : p.title}</h1></header>`;
  if (h1) h1.remove();

  let part = null, body = null, mi = 0;
  const openPart = headingEl => {
    part = document.createElement('section'); part.className = 'part';
    const head = document.createElement('div'); head.className = 'part-head';
    const mark = document.createElement('span'); mark.className = 'mark';
    mark.textContent = MARKS[Math.min(mi, MARKS.length - 1)]; mi++;
    head.appendChild(mark);
    if (headingEl) head.appendChild(headingEl);
    part.appendChild(head);
    body = document.createElement('div'); part.appendChild(body);
    const t = headingEl ? headingEl.textContent.trim() : '';
    if (t.startsWith('תרגול')) {
      const lbl = document.createElement('label'); lbl.className = 'done-row';
      lbl.innerHTML = `<input type="checkbox" ${S.drill.includes(p.date) ? 'checked' : ''}> בוצע התרגול`;
      lbl.querySelector('input').onchange = e => toggle(S.drill, p.date, e.target.checked);
      part.appendChild(lbl);
      part.dataset.tail = '1';
    }
    art.appendChild(part);
  };
  [...tmp.childNodes].forEach(node => {
    if (node.nodeType === 1 && node.tagName === 'H2') openPart(node);
    else if (body) {
      const tail = part.querySelector('.done-row');
      tail ? part.insertBefore(node, tail) : body.appendChild(node);
    }
    else if (!(node.nodeType === 3 && !node.textContent.trim())) { openPart(null); body.appendChild(node); }
  });

  const older = index[i + 1], newer = index[i - 1];
  const pager = document.createElement('div'); pager.className = 'pager';
  pager.innerHTML =
    `<a href="${older ? '#/' + older.date : '#'}" ${older ? '' : 'aria-disabled="true"'}><span>&rsaquo;</span> יום ${older ? older.day : ''}</a>
     <a href="${newer ? '#/' + newer.date : '#'}" ${newer ? '' : 'aria-disabled="true"'}>יום ${newer ? newer.day : ''} <span>&lsaquo;</span></a>`;
  art.appendChild(pager);

  view.innerHTML = ''; view.appendChild(art);
  $('#status').textContent = '';
  typeset(view);

  toggle(S.read, p.date, true);
  const n = runLength();
  $('#folio').textContent = n >= 2 ? 'רצף ' + n : '';
  window.scrollTo(0, 0);
}

/* ---- the map ---- */
let selected = null;
function renderMap() {
  setTab('tab-map');
  $('#folio').textContent = '';
  const view = $('#view');
  view.innerHTML = `<div class="view-head"><h1>המפה</h1>
    <p>שטח שיקול הדעת מתוך ה-Principal Engineer Curriculum. רמה L1-L5 נקבעת ביושר, ידנית. המפה מראָה, לא לוח ניקוד.</p></div>
    <div id="mapwrap"><canvas id="mapcanvas"></canvas></div>
    <div id="sheet"></div>`;
  $('#status').textContent = '';
  initCanvas();
  if (selected) renderSheet(selected);
  window.scrollTo(0, 0);
}

function renderSheet(d) {
  selected = d;
  const lv = S.maturity[d.id] || 0;
  $('#sheet').innerHTML = `<div class="domain-sheet">
    <div class="dhead"><h2>${d.name}</h2><span class="en">${d.en}</span></div>
    <p class="line">${d.line}</p>
    <p class="rule-q"><b>הכלל:</b> ${d.rule}</p>
    <div class="lvl-row"><span class="lbl">רמה</span>
      ${[1,2,3,4,5].map(n =>
        `<button class="lvl ${n < lv ? 'on' : ''} ${n === lv ? 'cur' : ''}" data-n="${n}" aria-label="רמה ${n}">${n}</button>`).join('')}
    </div></div>`;
  $('#sheet').querySelectorAll('.lvl').forEach(b => b.onclick = () => {
    const n = +b.dataset.n;
    S.maturity[d.id] = (S.maturity[d.id] === n) ? n - 1 : n;
    store.save(); renderSheet(d); drawMap();
  });
}

let cnv, ctx, nodes = [];
function initCanvas() {
  cnv = $('#mapcanvas'); ctx = cnv.getContext('2d');
  layout(); drawMap();
  addEventListener('resize', () => { if ($('#mapcanvas')) { layout(); drawMap(); } }, { passive: true });
  cnv.addEventListener('click', e => {
    const r = cnv.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    let best = null, bd = 1e9;
    nodes.forEach(n => { const d2 = (n.x - x) ** 2 + (n.y - y) ** 2; if (d2 < bd) { bd = d2; best = n; } });
    if (best && bd < 44 ** 2) { renderSheet(best.d); drawMap(best.d.id); }
  });
}
function layout() {
  const w = cnv.clientWidth, h = cnv.clientHeight, dpr = Math.min(devicePixelRatio || 1, 2);
  cnv.width = w * dpr; cnv.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const groups = jmap.groups.map(g => g.id);
  const centers = {}; // five clusters on a loose arc, RTL reading order
  const cx = w / 2, cy = h / 2 - 12, R = Math.min(w, h) * 0.33;
  groups.forEach((g, gi) => {
    const a = Math.PI * (0.05 + 0.9 * (gi / (groups.length - 1))); // arc top, right-to-left
    centers[g] = { x: cx + Math.cos(a) * R * 1.15, y: cy - Math.sin(a) * R * 0.85 + h * 0.16 };
  });
  nodes = [];
  jmap.groups.forEach(g => {
    const ds = jmap.domains.filter(d => d.group === g.id);
    const c = centers[g.id];
    ds.forEach((d, i) => {
      const a = (i / ds.length) * Math.PI * 2 + 0.7;
      const rr = ds.length > 1 ? 34 + 8 * (i % 2) : 0;
      nodes.push({ d, g: g.id, x: c.x + Math.cos(a) * rr, y: c.y + Math.sin(a) * rr, cx: c.x, cy: c.y });
    });
  });
}
function drawMap(activeId) {
  const cs = getComputedStyle(document.documentElement);
  const INK = cs.getPropertyValue('--ink').trim(), RED = cs.getPropertyValue('--red').trim(),
        RULE = cs.getPropertyValue('--rule').trim(), FADED = cs.getPropertyValue('--faded').trim();
  const w = cnv.clientWidth, h = cnv.clientHeight;
  ctx.clearRect(0, 0, w, h);
  // group ties: thin lines between cluster centers, then node-to-center
  ctx.strokeStyle = RULE; ctx.lineWidth = 1;
  const cents = {};
  nodes.forEach(n => cents[n.g] = { x: n.cx, y: n.cy });
  const cl = Object.values(cents);
  for (let i = 0; i < cl.length - 1; i++) {
    ctx.beginPath(); ctx.moveTo(cl[i].x, cl[i].y); ctx.lineTo(cl[i + 1].x, cl[i + 1].y); ctx.stroke();
  }
  nodes.forEach(n => { ctx.beginPath(); ctx.moveTo(n.cx, n.cy); ctx.lineTo(n.x, n.y); ctx.stroke(); });
  // group labels
  ctx.fillStyle = FADED; ctx.font = '700 11px "Frank Ruhl Libre", serif'; ctx.textAlign = 'center';
  jmap.groups.forEach(g => { const c = cents[g.id]; if (c) ctx.fillText(g.name, c.x, c.y - 52); });
  // nodes: ring of 5 level ticks + core
  nodes.forEach(n => {
    const lv = S.maturity[n.d.id] || 0;
    const act = n.d.id === activeId || (selected && n.d.id === selected.id);
    for (let k = 0; k < 5; k++) {
      const a0 = -Math.PI / 2 + k * (Math.PI * 2 / 5) + 0.09, a1 = a0 + (Math.PI * 2 / 5) - 0.18;
      ctx.beginPath(); ctx.arc(n.x, n.y, 14, a0, a1);
      ctx.strokeStyle = k < lv ? RED : RULE; ctx.lineWidth = k < lv ? 2.5 : 1.5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(n.x, n.y, act ? 6 : 4.5, 0, Math.PI * 2);
    ctx.fillStyle = act ? RED : INK; ctx.fill();
    ctx.fillStyle = act ? RED : INK; ctx.font = (act ? '700 ' : '400 ') + '11.5px "Frank Ruhl Libre", serif';
    ctx.fillText(n.d.name, n.x, n.y + 30);
  });
}

/* ---- the ladder ---- */
function renderLadder() {
  setTab('tab-ladder');
  $('#folio').textContent = '';
  const view = $('#view');
  const item = it => `<label class="ladder-item ${S.ladder.includes(it.id) ? 'done' : ''}" data-id="${it.id}">
    <input type="checkbox" ${S.ladder.includes(it.id) ? 'checked' : ''}><span>${it.t}</span></label>`;
  let html = `<div class="view-head"><h1>המסלול</h1>
    <p>סדר הלימוד מתוך Futuristic Learning Stack (אפריל 2026) ומסלול ההסמכה. סימון עצמי, בלי נקודות ובלי אשמה.</p></div>`;
  ladder.phases.forEach((ph, i) => {
    html += `<div class="phase"><div class="phase-head"><span class="mark">${MARKS[i]}</span><h2>${ph.name}</h2></div>
      ${ph.note ? `<p class="note">${ph.note}</p>` : ''}${ph.items.map(item).join('')}</div>`;
  });
  html += `<div class="phase"><div class="phase-head"><span class="mark">${MARKS[ladder.phases.length]}</span><h2>${ladder.cert.name}</h2></div>
    <p class="cert-facts">${ladder.cert.facts}</p>${ladder.cert.weeks.map(item).join('')}</div>`;
  view.innerHTML = html;
  $('#status').textContent = '';
  view.querySelectorAll('.ladder-item input').forEach(inp => inp.onchange = e => {
    const id = inp.closest('.ladder-item').dataset.id;
    toggle(S.ladder, id, e.target.checked);
    inp.closest('.ladder-item').classList.toggle('done', e.target.checked);
  });
  window.scrollTo(0, 0);
}

/* ---- routing ---- */
function route() {
  if (!index.length) return;
  const h = location.hash;
  if (h === '#/map') return renderMap();
  if (h === '#/ladder') return renderLadder();
  const m = h.match(/^#\/(\d{4}-\d{2}-\d{2})$/);
  const i = m ? index.findIndex(p => p.date === m[1]) : 0;
  renderPost(i >= 0 ? i : 0);
}
addEventListener('hashchange', route);

let ticking = false;
addEventListener('scroll', () => {
  if (ticking) return; ticking = true;
  requestAnimationFrame(() => {
    const max = document.documentElement.scrollHeight - innerHeight;
    $('#progress').style.width = (max > 0 ? (scrollY / max) * 100 : 0) + '%';
    ticking = false;
  });
}, { passive: true });

(async function boot() {
  try {
    [index, jmap, ladder] = await Promise.all([
      fetch('posts/index.json', { cache: 'no-cache' }).then(r => r.json()),
      fetch('judgment_map.json', { cache: 'no-cache' }).then(r => r.json()),
      fetch('research_ladder.json', { cache: 'no-cache' }).then(r => r.json())
    ]);
  } catch (e) { $('#status').textContent = 'אין רשת ואין עותק שמור עדיין.'; return; }
  route();
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
